app = "free-claude-code"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8082"
  MESSAGING_PLATFORM = "none"
  MODEL = "nvidia_nim/z-ai/glm4.7"
  ENABLE_MODEL_THINKING = "true"
  PROVIDER_RATE_LIMIT = "40"
  PROVIDER_RATE_WINDOW = "60"
  PROVIDER_MAX_CONCURRENCY = "5"
  # Set these after creating Redis and PostgreSQL resources:
  # DATABASE_URL="postgres://user:pass@host:5432/dbname"
  # REDIS_URL="redis://host:6379/0"

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

[mounts]
  source = "freeclaude_data"
  destination = "/app/agent_workspace"

# Scale to multiple regions for global low latency
# Uncomment and adjust regions as needed:
# [[regions]]
# iad = 1  # US East
# lhr = 1  # London
# sin = 1  # Singapore
# syd = 1  # Sydney
